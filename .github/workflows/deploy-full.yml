name: Build & Deploy NIS2 Ready Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install LiaScript Exporter
        run: npm install -g @liascript/exporter

      - name: Pull LiaScript exporter Docker image (for Android APK builds)
        run: docker pull liascript/exporter

      # PDF, SCORM 1.2 and SCORM 2004 are generated by liaex ITSELF here, via the
      # --project-generate-* flags. This is required, not optional: only files liaex
      # generates during this same "project" build get a matching download link wired
      # into index.html's course cards. Building them separately (as an earlier version
      # of this workflow did) produces zips nobody can reach from the site.
      - name: Build project catalog website (with auto PDF + SCORM 1.2 + SCORM 2004 per course)
        run: |
          mkdir -p cache
          liaex -i project.yaml --format project --output index \
            --project-generate-pdf \
            --project-generate-scorm12 \
            --project-generate-scorm2004 \
            --project-generate-cache -p ./cache \
            --project-search

      # xAPI and Android are NOT supported by --project-generate-*, so they still need
      # individual liaex calls. Each course is built from ONLY its own
      # materials/{n}-{slug}/ folder (-p pins the pack path explicitly), and every course
      # writes into its own dist/{slug}/ folder so one course's build can never pick up
      # or overwrite another course's files, or leftovers from a previous run.
      - name: Build per-course xAPI and Android APK packages
        run: |
          set -euo pipefail

          declare -A COURSES=(
            [welcome-why-nis2-matters]="materials/1-welcome-why-nis2-matters"
            [are-you-in-scope-essential-vs-important]="materials/2-are-you-in-scope-essential-vs-important"
            [the-10-measures-you-actually-need]="materials/3-the-10-measures-you-actually-need"
          )

          rm -rf dist
          mkdir -p dist

          for slug in "${!COURSES[@]}"; do
            dir="${COURSES[$slug]}"
            outdir="dist/$slug"
            mkdir -p "$outdir"

            echo "== Building $slug from $dir =="

            liaex -i "$dir/README.md" -f xapi -o "$outdir/$slug-xapi" -p "$dir" --xapi-zip

            docker run --rm \
              -v "$(pwd)/$dir":/work \
              -v "$(pwd)/$outdir":/output \
              liascript/exporter \
              liaex -f android -i /work/README.md \
                --android-appId "io.github.liaplayground.nis2.${slug//-/}" \
                --output "/output/$slug-android"
          done

      - name: Assemble deployment directory
        run: |
          mkdir -p gh-pages-deploy
          cp index.html gh-pages-deploy/

          # PDF/SCORM files land in ./cache with filenames liaex already linked from
          # index.html's cards — copy them next to index.html unchanged (per LiaScript's
          # own reference workflow), do not move them into a subfolder.
          find ./cache -maxdepth 1 -name "*.pdf" -exec cp {} gh-pages-deploy/ \;
          find ./cache -maxdepth 1 -name "*.zip" -exec cp {} gh-pages-deploy/ \;

          # xAPI/Android are ours to place; linked explicitly from project.yaml comments.
          mkdir -p gh-pages-deploy/downloads
          cp -r dist/* gh-pages-deploy/downloads/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-deploy
          force_orphan: true
          commit_message: "Deploy: ${{ github.event.head_commit.message || 'Manual run' }}"

      - name: Output website URL
        run: |
          echo "Deployed to: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
