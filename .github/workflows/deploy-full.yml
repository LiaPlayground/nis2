name: Build & Deploy NIS2 Ready Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Install LiaScript Exporter
        run: npm install -g @liascript/exporter

      # The exporter's --project-generate-* flags build every card themselves (SCORM
      # generation clones each course's repo to resolve relative assets correctly; PDF
      # renders straight from the fetched course). Output lands in ./assets/pdf,
      # ./assets/scorm12, ./assets/scorm2004 — matching the download links index.html
      # points to, so those folders must be copied to gh-pages as-is, not flattened.
      - name: Build project website with per-course PDF & SCORM downloads
        run: |
          liaex -i project.yaml --format project --output index \
            --project-generate-pdf --pdf-timeout 60000 \
            --project-generate-scorm12 \
            --project-generate-scorm2004 \
            --project-search

      - name: Assemble deployment directory
        run: |
          mkdir -p gh-pages-deploy
          cp index.html gh-pages-deploy/
          [ -d assets ] && cp -r assets gh-pages-deploy/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-deploy
          force_orphan: true
          commit_message: "Deploy: ${{ github.event.head_commit.message || 'Manual run' }}"

      - name: Output website URL
        run: |
          echo "Deployed to: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
