meta:
  title: NIS2 Ready — Cybersecurity Compliance for Public Administration & Critical Infrastructure
  description: >
    Ein interaktiver Selbstlernkurs (6 Einheiten, ca. 4-6 Stunden) zur EU-NIS2-Richtlinie
    (2022/2555) für Beschäftigte in der öffentlichen Verwaltung und in kritischen
    Infrastrukturen. Erfahren Sie, ob Ihre Organisation in den Anwendungsbereich fällt,
    welche konkreten Cybersicherheitsmaßnahmen erforderlich sind, wie Vorfälle behandelt
    und gemeldet werden, wer haftet, wenn etwas schiefgeht, und berechnen Sie Ihren eigenen
    NIS2-Readiness-Score.
  image: https://raw.githubusercontent.com/LiaPlayground/nis2/main/assets/images/hero.png

tags:
  - NIS2
  - Cybersicherheit
  - Compliance

collection:
  - html: >
      <h2>Was Sie lernen</h2>
      <p>Sechs Einheiten im eigenen Tempo, insgesamt etwa vier bis sechs Stunden &mdash;
      bearbeiten Sie sie der Reihe nach oder springen Sie direkt zu der Einheit, die Ihre
      Rolle am dringendsten braucht:</p>
      <ol>
        <li><strong>Willkommen &amp; Warum NIS2 wichtig ist</strong> (Modul, 25 Min) &mdash;
        führt in den Kursrhythmus und die Bedeutung des Themas ein.</li>
        <li><strong>Sind Sie im Anwendungsbereich? Wesentliche vs. wichtige Einrichtungen</strong>
        (Übung, 40 Min) &mdash; bestimmen Sie, ob Ihre Organisation unter NIS2 fällt.</li>
        <li><strong>Die 10 Maßnahmen, die Sie wirklich brauchen</strong> (Übung, 50 Min)
        &mdash; die Risikomanagementmaßnahmen aus Art. 21, in Alltagssprache übersetzt.</li>
        <li><strong>Umgang mit und Meldung von Vorfällen</strong> (Modul, 45 Min) &mdash;
        die 24-Stunden-/72-Stunden-/1-Monats-Frist für Vorfallmeldungen.</li>
        <li><strong>Wer ist verantwortlich? Governance &amp; Konsequenzen</strong> (Modul,
        40 Min) &mdash; Haftung und Sanktionen unter NIS2.</li>
        <li><strong>Ihr NIS2-Readiness-Score</strong> (Übung, 35 Min) &mdash; ein
        interaktiver Selbstbewertungsrechner.</li>
      </ol>
      <p><em>Die Einheiten 4&ndash;6 sind noch in Entwicklung und erscheinen unten, sobald sie veröffentlicht sind.</em></p>

  - url: https://raw.githubusercontent.com/LiaPlayground/nis2/main/materials/1-welcome-why-nis2-matters/README.md
    tags:
      - Einheit 1

  - url: https://raw.githubusercontent.com/LiaPlayground/nis2/main/materials/2-are-you-in-scope-essential-vs-important/README.md
