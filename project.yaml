collection:
  - html: >
      <h2>What You'll Learn</h2>
      <p>Six self-paced units, roughly four to six hours total &mdash; take them in order,
      or jump straight to the one your role needs most:</p>
      <ol>
        <li><strong>Welcome &amp; Why NIS2 Matters</strong> (lecture, 25 min) &mdash; sets up
        the course rhythm and the stakes.</li>
        <li><strong>Are You in Scope? Essential vs. Important Entities</strong> (exercise,
        40 min) &mdash; determine whether your organization falls under NIS2.</li>
        <li><strong>The 10 Measures You Actually Need</strong> (exercise, 50 min) &mdash; the
        Art. 21 risk-management measures, translated into plain language.</li>
        <li><strong>Handling &amp; Reporting Incidents</strong> (lecture, 45 min) &mdash; the
        24h / 72h / 1-month incident-reporting timeline.</li>
        <li><strong>Who's Responsible? Governance &amp; Consequences</strong> (lecture,
        40 min) &mdash; liability and sanctions under NIS2.</li>
        <li><strong>Your NIS2 Readiness Score</strong> (exercise, 35 min) &mdash; a live,
        interactive self-assessment calculator.</li>
      </ol>
      <p><em>Units 4&ndash;6 are still in development and will appear below once published.</em></p>

  - url: https://raw.githubusercontent.com/LiaPlayground/nis2/main/materials/1-welcome-why-nis2-matters/README.md
