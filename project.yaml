meta:
  title: NIS2 Ready — Cybersecurity Compliance for Public Administration & Critical Infrastructure
  description: >
    An interactive, self-paced course (6 units, ~4-6 hours) on the EU NIS2 Directive
    (2022/2555) for public administration and critical-infrastructure staff. Learn whether
    your organization is in scope, the concrete cybersecurity measures it requires, how to
    handle and report incidents, who's liable if things go wrong, and calculate your own
    NIS2 Readiness Score.
  image: https://raw.githubusercontent.com/LiaPlayground/nis2/main/assets/images/hero.png

